services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoices
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  mock-psp:
    build:
      context: .
      target: mock-psp
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"

  invoice-service:
    build:
      context: .
      target: invoice-service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/invoices
      PSP_URL: http://mock-psp:8081/charge
      LISTEN_ADDR: 0.0.0.0:8080
    depends_on:
      postgres:
        condition: service_healthy
      mock-psp:
        condition: service_started
